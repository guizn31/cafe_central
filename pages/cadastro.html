<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="widht=device-width, initial-scale=1.0">
        <meta name="description" content="A café é a melhor cafeteria da região">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/auth.css">
        <title>Café Central - A melhor cafeteria da região</title>
    </head>

    <body>
        <header class="topo">
            <div class="logo">
                <a href="../index.html">Café<span>Central</span></a>
            </div>
            <nav class="menu">
                <a href="../index.html">Início</a>
                <a href="../pages/sobre.html">Sobre</a>
                <a href="../pages/contato.html">Contato</a>
            </nav>
        </header>

        <main class="container pagina-auth">
            <section class="bloco-auth">

                <h1>Cadastro</h1>
                <p class="texto-auth">Crie sua conta para acessar o cardápio</p>

                <form class="form-auth" id="formCadastro">

                    <label for="nomeCadastro">Nome</label>
                    <input type="text" id="nomeCadastro" placeholder="Digite seu nome" required>

                    <label for="emailCadastro">E-mail</label>
                    <input type="email" id="emailCadastro" placeholder="Digite seu e-mail" required>

                    <label for="senhaCadastro">Senha</label>
                    <input type="password" id="senhaCadastro" placeholder="Digite sua senha" required>

                    <button type="submit" class="btn-primario">Cadastrar</button>

                    <p id="mensagemCadastro" class="mensagem-auth"></p>
                </form>

                <p class="link-auth">
                    Já possui uma conta?
                    <a href="../pages/login.html">Fazer Login</a>
                </p>

            </section>
        </main>

        <footer class="rodape">
            <p>® 2026 Café Central. Todos os Direitos Reservados</p>
            <p><a href="../pages/contato.html">Entre em Contato</a></p>
        </footer>

    <script src="../js/script.js"></script>
    </body>
</html>
